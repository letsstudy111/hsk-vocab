<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK Từ Vựng - Học Tiếng Trung</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Nunito:wght@400;600;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#e63946;--red-light:#ff6b7a;--red-soft:#fff0f1;
  --green:#2a9d8f;--green-soft:#e8faf8;
  --gold:#f4a261;--gold-soft:#fff7ed;
  --blue:#3a86ff;--blue-soft:#eff6ff;
  --bg:#f7f6fb;--card:#fff;--text:#1a1a2e;--muted:#6c757d;--light:#f0eef9;
  --border:rgba(0,0,0,0.07);--radius:14px;--radius-sm:8px;
  --shadow:0 2px 16px rgba(0,0,0,0.06);--shadow-lg:0 8px 36px rgba(0,0,0,0.13);
}

body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ===== NAV ===== */
nav{background:var(--card);border-bottom:1.5px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:200;box-shadow:0 1px 12px rgba(0,0,0,0.06)}
.logo{display:flex;align-items:center;gap:10px;font-family:'Nunito',sans-serif;font-weight:900;font-size:1.35rem;color:var(--red);text-decoration:none}
.logo-box{width:36px;height:36px;background:linear-gradient(135deg,var(--red),var(--red-light));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif SC',serif;font-size:1.1rem;color:white;font-weight:700}
.nav-stats{display:flex;gap:1rem;align-items:center}
.ns{display:flex;align-items:center;gap:5px;font-size:0.82rem;font-weight:600;color:var(--muted)}
.ns-dot{width:9px;height:9px;border-radius:50%}
.dot-k{background:#2a9d8f}.dot-u{background:#e63946}.dot-t{background:#adb5bd}

/* ===== LAYOUT ===== */
.page{display:grid;grid-template-columns:248px 1fr;min-height:calc(100vh - 60px)}

/* ===== SIDEBAR ===== */
.sidebar{background:var(--card);border-right:1.5px solid var(--border);padding:1rem;display:flex;flex-direction:column;gap:.75rem;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto}
.sidebar-label{font-size:.7rem;font-weight:800;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding-left:6px;margin-bottom:2px}
.lvl-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:.6rem .9rem;border-radius:var(--radius-sm);border:none;background:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;color:var(--muted);transition:all .18s;text-align:left}
.lvl-btn:hover{background:var(--red-soft);color:var(--red)}
.lvl-btn.active{background:var(--red);color:white}
.lvl-btn .lc{font-size:.72rem;background:rgba(0,0,0,.1);padding:2px 7px;border-radius:99px}
.lvl-btn.active .lc{background:rgba(255,255,255,.25)}
.prog-wrap{padding:0 4px}
.prog-row{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-bottom:5px}
.prog-bar{height:7px;background:#f0eef9;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--green),#52b788);border-radius:99px;transition:width .5s}
.divider{height:1px;background:var(--border)}
.filter-group{display:flex;flex-direction:column;gap:3px}
.fb{display:flex;align-items:center;gap:8px;padding:.55rem .9rem;border-radius:var(--radius-sm);border:none;background:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:600;color:var(--muted);transition:all .18s;text-align:left;width:100%}
.fb:hover{background:#f5f5f5}
.fb.active{background:var(--red-soft);color:var(--red)}
.reset-btn{width:100%;padding:9px;border:1.5px solid #ffcdd2;background:#fff5f5;color:var(--red);border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s}
.reset-btn:hover{background:var(--red);color:white}

/* ===== MAIN ===== */
.main{padding:1.25rem 1.5rem 3rem}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:1.1rem;flex-wrap:wrap}
.search-wrap{flex:1;min-width:180px;position:relative}
.search-wrap input{width:100%;padding:9px 14px 9px 38px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:.9rem;background:var(--card);color:var(--text);outline:none;transition:border .2s}
.search-wrap input:focus{border-color:var(--red)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:.9rem}
.sort-sel{padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:.85rem;background:var(--card);color:var(--text);outline:none;cursor:pointer}
.page-info{font-size:.82rem;color:var(--muted);white-space:nowrap}

/* ===== GRID ===== */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px}

.word-card{background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);padding:1rem;cursor:pointer;transition:all .2s;position:relative;box-shadow:var(--shadow)}
.word-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:#ffb3ba}
.word-card.known{border-color:var(--green);background:linear-gradient(135deg,#f0fafa,#fff)}
.word-card.unknown{border-color:var(--red);background:linear-gradient(135deg,#fff5f5,#fff)}

.wc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.wc-hsk{font-size:.68rem;font-weight:800;padding:2px 7px;border-radius:99px;background:var(--red-soft);color:var(--red)}
.wc-mark{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all .18s;background:white;cursor:pointer;flex-shrink:0}
.wc-mark:hover{transform:scale(1.15)}
.wc-mark.known{background:var(--green);border-color:var(--green);color:white}
.wc-mark.unknown{background:var(--red);border-color:var(--red);color:white}
.wc-hanzi{font-family:'Noto Serif SC',serif;font-size:1.75rem;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.2}
.wc-pinyin{font-size:.8rem;color:var(--red);font-weight:600;margin-bottom:5px}
.wc-type{font-size:.7rem;color:var(--muted);font-style:italic;margin-bottom:3px}
.wc-meaning{font-size:.85rem;color:#444;line-height:1.4}
.wc-stroke-hint{font-size:.68rem;color:var(--muted);margin-top:8px;opacity:.7}

/* ===== PAGINATION ===== */
.pagination{display:flex;justify-content:center;align-items:center;gap:5px;margin-top:1.75rem;flex-wrap:wrap}
.pag-btn{padding:7px 13px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card);font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .18s;color:var(--text)}
.pag-btn:hover{border-color:var(--red);color:var(--red)}
.pag-btn.active{background:var(--red);color:white;border-color:var(--red)}
.pag-btn:disabled{opacity:.4;cursor:default}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--card);border-radius:20px;width:100%;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden;position:relative}
.modal-header{background:linear-gradient(135deg,var(--red),#c1121f);padding:1.5rem 1.75rem 1.25rem;color:white;position:relative}
.modal-close{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,.2);border:none;color:white;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background .2s}
.modal-close:hover{background:rgba(255,255,255,.35)}
.modal-hsk{font-size:.72rem;font-weight:800;opacity:.8;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.modal-hanzi{font-family:'Noto Serif SC',serif;font-size:3rem;font-weight:700;line-height:1;margin-bottom:6px}
.modal-pinyin{font-size:1.1rem;opacity:.9;font-weight:500;margin-bottom:4px}
.modal-type{font-size:.82rem;opacity:.75;font-style:italic}

.modal-body{padding:1.5rem 1.75rem}
.modal-meaning{font-size:1.1rem;font-weight:600;color:var(--text);margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}

/* Stroke area */
.stroke-section{margin-bottom:1.25rem}
.stroke-label{font-size:.75rem;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.6rem}
.stroke-chars{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.stroke-char-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.stroke-char-label{font-size:.68rem;color:var(--muted)}
.stroke-canvas-wrap{width:120px;height:120px;border:1.5px solid var(--border);border-radius:10px;background:#fafafa;display:flex;align-items:center;justify-content:center;position:relative}

/* Controls */
.modal-controls{display:flex;gap:8px;flex-wrap:wrap}
.ctrl-btn{flex:1;min-width:100px;padding:10px 16px;border-radius:10px;border:none;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.ctrl-btn:hover{transform:translateY(-1px)}
.btn-animate{background:linear-gradient(135deg,var(--red),var(--red-light));color:white}
.btn-quiz{background:linear-gradient(135deg,var(--blue),#60a5fa);color:white}

/* Nav arrows */
.modal-nav{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.75rem;border-top:1px solid var(--border);background:#fafafa}
.nav-arrow{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:8px 18px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;color:var(--text);transition:all .2s;display:flex;align-items:center;gap:6px}
.nav-arrow:hover{background:var(--red);color:white;border-color:var(--red)}
.nav-arrow:disabled{opacity:.35;cursor:default}
.nav-arrow:hover:disabled{background:var(--card);color:var(--text);border-color:var(--border)}
.nav-pos{font-size:.82rem;color:var(--muted);font-weight:600}

/* Mark buttons */
.mark-row{display:flex;gap:8px;margin-bottom:.75rem}
.mark-btn{flex:1;padding:9px;border-radius:10px;border:2px solid;font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s}
.mark-known{border-color:var(--green);background:var(--green-soft);color:var(--green)}
.mark-known:hover,.mark-known.active{background:var(--green);color:white}
.mark-unknown{border-color:var(--red);background:var(--red-soft);color:var(--red)}
.mark-unknown:hover,.mark-unknown.active{background:var(--red);color:white}

/* Toast */
.toast{position:fixed;bottom:1.75rem;right:1.75rem;background:#1a1a2e;color:white;padding:11px 18px;border-radius:10px;font-size:.85rem;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

.empty{text-align:center;padding:4rem;color:var(--muted);grid-column:1/-1}

@media(max-width:700px){
  .page{grid-template-columns:1fr}
  .sidebar{display:none}
  .vocab-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
}
</style>
</head>
<body>

<nav>
  <a class="logo" href="#">
    <div class="logo-box">汉</div>
    HSK Từ Vựng
  </a>
  <div class="nav-stats">
    <div class="ns"><div class="ns-dot dot-k"></div><span id="stat-k">0 đã thuộc</span></div>
    <div class="ns"><div class="ns-dot dot-u"></div><span id="stat-u">0 chưa thuộc</span></div>
    <div class="ns"><div class="ns-dot dot-t"></div><span id="stat-t">0 tổng</span></div>
  </div>
</nav>

<div class="page">
<aside class="sidebar">
  <div>
    <div class="sidebar-label">Cấp độ HSK</div>
    <div id="level-btns"></div>
  </div>
  <div class="divider"></div>
  <div class="prog-wrap">
    <div class="prog-row"><span>Tiến độ học</span><span id="prog-pct">0%</span></div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="divider"></div>
  <div>
    <div class="sidebar-label">Trạng thái</div>
    <div class="filter-group">
      <button class="fb active" data-f="all" onclick="setFilter('all')">📋 Tất cả</button>
      <button class="fb" data-f="known" onclick="setFilter('known')">✅ Đã thuộc</button>
      <button class="fb" data-f="unknown" onclick="setFilter('unknown')">❌ Chưa thuộc</button>
      <button class="fb" data-f="unmarked" onclick="setFilter('unmarked')">⬜ Chưa đánh dấu</button>
    </div>
  </div>
  <div class="divider"></div>
  <button class="reset-btn" onclick="resetAll()">🗑️ Xóa tất cả đánh dấu</button>
</aside>

<main class="main">
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Tìm chữ Hán, pinyin, nghĩa..." oninput="onSearch()">
    </div>
    <select class="sort-sel" onchange="onSort(this.value)">
      <option value="default">Mặc định</option>
      <option value="hanzi">Chữ Hán A→Z</option>
      <option value="pinyin">Pinyin A→Z</option>
      <option value="known-first">Đã thuộc trước</option>
      <option value="unknown-first">Chưa thuộc trước</option>
    </select>
    <div class="page-info" id="page-info"></div>
  </div>
  <div class="vocab-grid" id="vocab-grid"></div>
  <div class="pagination" id="pagination"></div>
</main>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-hsk" id="m-hsk"></div>
      <div class="modal-hanzi" id="m-hanzi"></div>
      <div class="modal-pinyin" id="m-pinyin"></div>
      <div class="modal-type" id="m-type"></div>
    </div>
    <div class="modal-body">
      <div class="modal-meaning" id="m-meaning"></div>

      <div class="mark-row">
        <button class="mark-btn mark-known" id="btn-known" onclick="markFromModal('known')">✓ Đã thuộc</button>
        <button class="mark-btn mark-unknown" id="btn-unknown" onclick="markFromModal('unknown')">✗ Chưa thuộc</button>
      </div>

      <div class="stroke-section">
        <div class="stroke-label">✍️ Cách viết từng chữ</div>
        <div class="stroke-chars" id="stroke-chars"></div>
      </div>

      <div class="modal-controls">
        <button class="ctrl-btn btn-animate" onclick="animateAll()">▶ Xem viết lại</button>
      </div>
    </div>
    <div class="modal-nav">
      <button class="nav-arrow" id="btn-prev" onclick="navWord(-1)">← Trước</button>
      <div class="nav-pos" id="nav-pos"></div>
      <button class="nav-arrow" id="btn-next" onclick="navWord(1)">Sau →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// HSK DATA — comprehensive vocabulary
// ============================================================
const HSK_DATA = [

// ============================================================
// STATE
// ============================================================
const PER_PAGE = 60;
let curLevel = 'all', curFilter = 'all', curSort = 'default';
let searchQ = '', curPage = 1;
let known = {};
let modalWords = [], modalIdx = 0;
let hwWriters = [];

function loadState(){ try{ known = JSON.parse(localStorage.getItem('hsk_known')||'{}'); }catch(e){ known={}; } }
function saveState(){ localStorage.setItem('hsk_known', JSON.stringify(known)); }
function getKey(w){ return w.h+'_'+w.l; }

// ============================================================
// FILTER / SORT
// ============================================================
function getFiltered(){
  let d = [...HSK_DATA];
  if(curLevel!=='all') d = d.filter(w=>w.l===+curLevel);
  if(searchQ){
    const q=searchQ.toLowerCase();
    d = d.filter(w=>w.h.includes(q)||w.p.toLowerCase().includes(q)||w.m.toLowerCase().includes(q));
  }
  if(curFilter==='known') d=d.filter(w=>known[getKey(w)]==='known');
  else if(curFilter==='unknown') d=d.filter(w=>known[getKey(w)]==='unknown');
  else if(curFilter==='unmarked') d=d.filter(w=>!known[getKey(w)]);
  if(curSort==='hanzi') d.sort((a,b)=>a.h.localeCompare(b.h,'zh'));
  else if(curSort==='pinyin') d.sort((a,b)=>a.p.localeCompare(b.p));
  else if(curSort==='known-first') d.sort((a,b)=>(known[getKey(a)]==='known'?0:1)-(known[getKey(b)]==='known'?0:1));
  else if(curSort==='unknown-first') d.sort((a,b)=>(known[getKey(a)]==='unknown'?0:1)-(known[getKey(b)]==='unknown'?0:1));
  return d;
}

// ============================================================
// RENDER
// ============================================================
function renderCards(){
  const data = getFiltered();
  const total = data.length;
  const totalPages = Math.max(1, Math.ceil(total/PER_PAGE));
  if(curPage>totalPages) curPage=1;
  const slice = data.slice((curPage-1)*PER_PAGE, curPage*PER_PAGE);
  document.getElementById('page-info').textContent = total>0?`${total} từ · Trang ${curPage}/${totalPages}`:'0 từ';
  const grid = document.getElementById('vocab-grid');
  if(!slice.length){
    grid.innerHTML='<div class="empty"><div style="font-size:2.5rem;margin-bottom:.75rem">🔍</div>Không tìm thấy từ nào</div>';
  } else {
    // save filtered for modal navigation
    modalWords = data;
    grid.innerHTML = slice.map((w,i)=>{
      const key=getKey(w), st=known[key]||'';
      const icon=st==='known'?'✓':st==='unknown'?'✗':'○';
      const dataIdx = (curPage-1)*PER_PAGE + i;
      return `<div class="word-card ${st}" onclick="openModal(${dataIdx})">
        <div class="wc-top">
          <span class="wc-hsk">HSK ${w.l}</span>
          <div class="wc-mark ${st}" onclick="event.stopPropagation();quickMark('${key}')" title="Đánh dấu">${icon}</div>
        </div>
        <div class="wc-hanzi">${w.h}</div>
        <div class="wc-pinyin">${w.p}</div>
        <div class="wc-type">${w.t}</div>
        <div class="wc-meaning">${w.m}</div>
        <div class="wc-stroke-hint">✍️ Nhấn để xem cách viết</div>
      </div>`;
    }).join('');
  }
  renderPagination(totalPages);
  updateStats();
}

function renderPagination(totalPages){
  const el=document.getElementById('pagination');
  if(totalPages<=1){el.innerHTML='';return;}
  let html=`<button class="pag-btn" onclick="goPage(${curPage-1})" ${curPage===1?'disabled':''}>‹ Trước</button>`;
  const range=[];
  for(let i=1;i<=totalPages;i++){
    if(i===1||i===totalPages||(i>=curPage-2&&i<=curPage+2)) range.push(i);
    else if(range[range.length-1]!=='...') range.push('...');
  }
  range.forEach(p=>{
    if(p==='...') html+=`<span style="padding:7px 4px;color:var(--muted)">…</span>`;
    else html+=`<button class="pag-btn ${p===curPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });
  html+=`<button class="pag-btn" onclick="goPage(${curPage+1})" ${curPage===totalPages?'disabled':''}>Sau ›</button>`;
  el.innerHTML=html;
}

function goPage(p){ curPage=p; renderCards(); window.scrollTo({top:0,behavior:'smooth'}); }

function updateStats(){
  let tk=0,tu=0;
  HSK_DATA.forEach(w=>{const s=known[getKey(w)];if(s==='known')tk++;else if(s==='unknown')tu++;});
  document.getElementById('stat-k').textContent=tk+' đã thuộc';
  document.getElementById('stat-u').textContent=tu+' chưa thuộc';
  document.getElementById('stat-t').textContent=HSK_DATA.length+' tổng';
  const pct=Math.round(tk/HSK_DATA.length*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  updateLevelCounts();
}

function updateLevelCounts(){
  [0,1,2,3,4,5,6].forEach(l=>{
    const el=document.getElementById('lc-'+l);
    if(!el)return;
    const ws=l===0?HSK_DATA:HSK_DATA.filter(w=>w.l===l);
    const k=ws.filter(w=>known[getKey(w)]==='known').length;
    el.textContent=`${k}/${ws.length}`;
  });
}

// ============================================================
// MARK
// ============================================================
function quickMark(key){
  const cur=known[key]||'';
  if(!cur) known[key]='known';
  else if(cur==='known') known[key]='unknown';
  else delete known[key];
  saveState();
  renderCards();
  const lbl=known[key]==='known'?'✓ Đã thuộc':known[key]==='unknown'?'✗ Chưa thuộc':'○ Bỏ đánh dấu';
  showToast(lbl);
}

function markFromModal(st){
  if(!modalWords.length) return;
  const w=modalWords[modalIdx];
  const key=getKey(w);
  if(known[key]===st) delete known[key];
  else known[key]=st;
  saveState();
  updateModalMarkBtns();
  updateStats();
  // update card in background
  const cards=document.querySelectorAll('.word-card');
  renderCards();
  showToast(known[key]==='known'?'✓ Đã thuộc':known[key]==='unknown'?'✗ Chưa thuộc':'○ Bỏ đánh dấu');
}

function updateModalMarkBtns(){
  if(!modalWords.length)return;
  const w=modalWords[modalIdx], st=known[getKey(w)]||'';
  document.getElementById('btn-known').classList.toggle('active',st==='known');
  document.getElementById('btn-unknown').classList.toggle('active',st==='unknown');
}

function resetAll(){
  if(!confirm('Xóa tất cả đánh dấu?'))return;
  known={}; saveState(); renderCards(); showToast('Đã xóa tất cả');
}

// ============================================================
// MODAL + STROKE
// ============================================================
function openModal(idx){
  modalIdx=idx;
  renderModal();
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal-overlay').classList.add('hidden');
  document.body.style.overflow='';
  hwWriters=[];
}

function closeModalOutside(e){
  if(e.target===document.getElementById('modal-overlay')) closeModal();
}

function navWord(dir){
  const newIdx=modalIdx+dir;
  if(newIdx<0||newIdx>=modalWords.length)return;
  modalIdx=newIdx;
  renderModal();
}

function renderModal(){
  if(!modalWords.length)return;
  const w=modalWords[modalIdx];
  document.getElementById('m-hsk').textContent='HSK '+w.l;
  document.getElementById('m-hanzi').textContent=w.h;
  document.getElementById('m-pinyin').textContent=w.p;
  document.getElementById('m-type').textContent=w.t;
  document.getElementById('m-meaning').textContent=w.m;
  document.getElementById('nav-pos').textContent=(modalIdx+1)+' / '+modalWords.length;
  document.getElementById('btn-prev').disabled=modalIdx===0;
  document.getElementById('btn-next').disabled=modalIdx===modalWords.length-1;
  updateModalMarkBtns();
  renderStrokes(w.h);
}

function renderStrokes(hanzi){
  const container=document.getElementById('stroke-chars');
  container.innerHTML='';
  hwWriters=[];
  const chars=[...hanzi]; // split into individual characters
  chars.forEach((ch,i)=>{
    if(!/[\u4e00-\u9fff]/.test(ch)) return; // skip non-CJK
    const wrap=document.createElement('div');
    wrap.className='stroke-char-wrap';
    const label=document.createElement('div');
    label.className='stroke-char-label';
    label.textContent=ch;
    const canvasWrap=document.createElement('div');
    canvasWrap.className='stroke-canvas-wrap';
    canvasWrap.id='hw-'+i;
    wrap.appendChild(canvasWrap);
    wrap.appendChild(label);
    container.appendChild(wrap);

    try{
      const writer=HanziWriter.create('hw-'+i, ch, {
        width:110, height:110,
        padding:8,
        showOutline:true,
        strokeColor:'#e63946',
        outlineColor:'#ddd',
        drawingColor:'#e63946',
        strokeAnimationSpeed:1,
        delayBetweenStrokes:200,
      });
      writer.animateCharacter();
      hwWriters.push(writer);
    }catch(e){
      canvasWrap.innerHTML='<span style="font-size:2rem;font-family:Noto Serif SC">'+ch+'</span>';
    }
  });
}

function animateAll(){
  hwWriters.forEach((w,i)=>{
    setTimeout(()=>w.animateCharacter(),i*600);
  });
}

// ============================================================
// SIDEBAR INIT
// ============================================================
function initSidebar(){
  const container=document.getElementById('level-btns');
  const levels=[
    {l:0,label:'Tất cả'},
    {l:1,label:'HSK 1'},{l:2,label:'HSK 2'},{l:3,label:'HSK 3'},
    {l:4,label:'HSK 4'},{l:5,label:'HSK 5'},{l:6,label:'HSK 6'},
  ];
  container.innerHTML=levels.map(lv=>{
    const count=lv.l===0?HSK_DATA.length:HSK_DATA.filter(w=>w.l===lv.l).length;
    return `<button class="lvl-btn ${lv.l===0?'active':''}" id="lb-${lv.l}" onclick="setLevel(${lv.l})">
      <span>${lv.label}</span>
      <span class="lc" id="lc-${lv.l}">0/${count}</span>
    </button>`;
  }).join('');
}

function setLevel(l){
  curLevel=l; curPage=1;
  document.querySelectorAll('.lvl-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('lb-'+l).classList.add('active');
  renderCards();
}

function setFilter(f){
  curFilter=f; curPage=1;
  document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('active',b.dataset.f===f));
  renderCards();
}

function onSearch(){ searchQ=document.getElementById('search').value.trim(); curPage=1; renderCards(); }
function onSort(v){ curSort=v; curPage=1; renderCards(); }

// keyboard nav in modal
document.addEventListener('keydown',e=>{
  if(document.getElementById('modal-overlay').classList.contains('hidden'))return;
  if(e.key==='ArrowRight') navWord(1);
  else if(e.key==='ArrowLeft') navWord(-1);
  else if(e.key==='Escape') closeModal();
});

// ============================================================
// TOAST
// ============================================================
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.classList.remove('show'),1600);
}

// ============================================================

loadState();
initSidebar();
renderCards();
</script>
