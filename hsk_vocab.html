<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK Từ Vựng - Học Tiếng Trung</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --primary:#e63946;--primary-light:#ff6b7a;--primary-soft:#fff0f1;
    --gold:#f4a261;--gold-soft:#fff7ed;
    --green:#2a9d8f;--green-soft:#e8faf8;
    --bg:#f9f8fc;--card:#fff;--text:#1a1a2e;--muted:#6c757d;
    --border:rgba(0,0,0,0.08);--radius:14px;--radius-sm:8px;
    --shadow:0 2px 16px rgba(0,0,0,0.07);--shadow-lg:0 6px 32px rgba(0,0,0,0.12);
  }
  body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  /* NAV */
  nav{background:var(--card);border-bottom:1.5px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:62px;position:sticky;top:0;z-index:200;box-shadow:var(--shadow)}
  .logo{display:flex;align-items:center;gap:10px;font-family:'Nunito',sans-serif;font-weight:900;font-size:1.4rem;color:var(--primary);text-decoration:none}
  .logo-box{width:38px;height:38px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:white}
  .nav-stats{display:flex;gap:1.5rem;align-items:center}
  .ns{display:flex;align-items:center;gap:6px;font-size:0.88rem;font-weight:600}
  .ns-dot{width:10px;height:10px;border-radius:50%}
  .dot-known{background:#2a9d8f}.dot-unknown{background:#e63946}.dot-total{background:#aaa}

  /* LAYOUT */
  .page{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 62px)}

  /* SIDEBAR */
  .sidebar{background:var(--card);border-right:1.5px solid var(--border);padding:1.25rem;display:flex;flex-direction:column;gap:1rem;position:sticky;top:62px;height:calc(100vh - 62px);overflow-y:auto}
  .sidebar-title{font-size:0.72rem;font-weight:800;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;padding-left:4px}
  .level-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:0.65rem 1rem;border-radius:var(--radius-sm);border:none;background:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:0.9rem;font-weight:600;color:var(--muted);transition:all 0.18s;text-align:left}
  .level-btn:hover{background:var(--primary-soft);color:var(--primary)}
  .level-btn.active{background:var(--primary);color:white}
  .level-btn .lcount{font-size:0.75rem;background:rgba(0,0,0,0.12);padding:2px 8px;border-radius:99px}
  .level-btn.active .lcount{background:rgba(255,255,255,0.25)}
  .progress-wrap{margin-top:4px}
  .prog-label{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted);margin-bottom:5px}
  .prog-bar{height:7px;background:#f0f0f0;border-radius:99px;overflow:hidden}
  .prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),#52b788);transition:width 0.5s}
  .filter-group{display:flex;flex-direction:column;gap:4px}
  .filter-btn{display:flex;align-items:center;gap:8px;padding:0.6rem 1rem;border-radius:var(--radius-sm);border:none;background:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:0.88rem;font-weight:600;color:var(--muted);transition:all 0.18s;text-align:left;width:100%}
  .filter-btn:hover{background:#f5f5f5}
  .filter-btn.active{background:var(--primary-soft);color:var(--primary)}
  .f-icon{font-size:1rem;width:20px;text-align:center}
  .divider{height:1px;background:var(--border)}

  /* MAIN */
  .main{padding:1.5rem 2rem;flex:1}
  .toolbar{display:flex;gap:12px;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap}
  .search-wrap{flex:1;min-width:200px;position:relative}
  .search-wrap input{width:100%;padding:10px 16px 10px 42px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:0.93rem;background:var(--card);color:var(--text);outline:none;transition:border 0.2s}
  .search-wrap input:focus{border-color:var(--primary)}
  .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem;pointer-events:none}
  .sort-select{padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:0.88rem;background:var(--card);color:var(--text);outline:none;cursor:pointer}
  .page-info{font-size:0.85rem;color:var(--muted);white-space:nowrap}

  /* GRID */
  .vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
  .word-card{background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);padding:1.1rem;cursor:pointer;transition:all 0.2s;position:relative;box-shadow:var(--shadow)}
  .word-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--primary-light)}
  .word-card.known{border-color:#2a9d8f;background:linear-gradient(135deg,#f0fafa,#fff)}
  .word-card.unknown{border-color:#e63946;background:linear-gradient(135deg,#fff5f5,#fff)}
  .wc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
  .wc-hsk{font-size:0.7rem;font-weight:800;padding:2px 8px;border-radius:99px;background:var(--primary-soft);color:var(--primary)}
  .wc-mark{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.85rem;transition:all 0.18s;background:white;cursor:pointer;flex-shrink:0}
  .wc-mark:hover{transform:scale(1.15)}
  .wc-mark.known{background:#2a9d8f;border-color:#2a9d8f;color:white}
  .wc-mark.unknown{background:#e63946;border-color:#e63946;color:white}
  .wc-hanzi{font-size:1.8rem;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.2}
  .wc-pinyin{font-size:0.82rem;color:var(--primary);font-weight:600;margin-bottom:6px}
  .wc-type{font-size:0.72rem;color:var(--muted);font-style:italic;margin-bottom:4px}
  .wc-meaning{font-size:0.88rem;color:#444;line-height:1.4}

  /* PAGINATION */
  .pagination{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:2rem;flex-wrap:wrap}
  .pag-btn{padding:8px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card);font-family:'Outfit',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all 0.18s;color:var(--text)}
  .pag-btn:hover{border-color:var(--primary);color:var(--primary)}
  .pag-btn.active{background:var(--primary);color:white;border-color:var(--primary)}
  .pag-btn:disabled{opacity:0.4;cursor:default}

  /* EMPTY */
  .empty{text-align:center;padding:4rem 2rem;color:var(--muted)}
  .empty-icon{font-size:3rem;margin-bottom:1rem}

  /* TOAST */
  .toast{position:fixed;bottom:2rem;right:2rem;background:#1a1a2e;color:white;padding:12px 20px;border-radius:var(--radius-sm);font-size:0.88rem;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
  .toast.show{opacity:1}

  @media(max-width:768px){
    .page{grid-template-columns:1fr}
    .sidebar{display:none}
    .main{padding:1rem}
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="#">
    <div class="logo-box">汉</div>
    HSK từ vựng
  </a>
  <div class="nav-stats">
    <div class="ns"><div class="ns-dot dot-known"></div><span id="stat-known">0 đã thuộc</span></div>
    <div class="ns"><div class="ns-dot dot-unknown"></div><span id="stat-unknown">0 chưa thuộc</span></div>
    <div class="ns"><div class="ns-dot dot-total"></div><span id="stat-total">0 tổng</span></div>
  </div>
</nav>

<div class="page">
  <aside class="sidebar">
    <div>
      <div class="sidebar-title">Cấp độ HSK</div>
      <div class="filter-group" id="level-btns"></div>
    </div>

    <div class="divider"></div>

    <div class="progress-wrap">
      <div class="prog-label"><span>Tiến độ học</span><span id="prog-pct">0%</span></div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="sidebar-title">Lọc theo trạng thái</div>
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')"><span class="f-icon">📋</span> Tất cả</button>
        <button class="filter-btn" data-filter="known" onclick="setFilter('known')"><span class="f-icon">✅</span> Đã thuộc</button>
        <button class="filter-btn" data-filter="unknown" onclick="setFilter('unknown')"><span class="f-icon">❌</span> Chưa thuộc</button>
        <button class="filter-btn" data-filter="unmarked" onclick="setFilter('unmarked')"><span class="f-icon">⬜</span> Chưa đánh dấu</button>
      </div>
    </div>

    <div class="divider"></div>

    <div style="padding:4px">
      <button onclick="resetAll()" style="width:100%;padding:10px;border:1.5px solid #ffcdd2;background:#fff5f5;color:#e63946;border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer">🗑️ Xóa tất cả đánh dấu</button>
    </div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" placeholder="Tìm từ Hán, pinyin, nghĩa..." oninput="onSearch()">
      </div>
      <select class="sort-select" onchange="onSort(this.value)">
        <option value="default">Mặc định</option>
        <option value="hanzi">Theo chữ Hán A→Z</option>
        <option value="pinyin">Theo pinyin A→Z</option>
        <option value="known-first">Đã thuộc trước</option>
        <option value="unknown-first">Chưa thuộc trước</option>
      </select>
      <div class="page-info" id="page-info"></div>
    </div>

    <div class="vocab-grid" id="vocab-grid"></div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

];

// ========== STATE ==========
const PER_PAGE = 60;
let currentLevel = 'all';
let currentFilter = 'all';
let currentSort = 'default';
let searchQuery = '';
let currentPage = 1;
let known = {};

function loadState() {
  try { known = JSON.parse(localStorage.getItem('hsk_known') || '{}'); } catch(e) { known = {}; }
}
function saveState() {
  localStorage.setItem('hsk_known', JSON.stringify(known));
}

function getKey(w) { return w.h + '_' + w.l; }

// ========== FILTER/SORT ==========
function getFiltered() {
  let data = [...HSK_DATA];
  if (currentLevel !== 'all') data = data.filter(w => w.l === +currentLevel);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    data = data.filter(w => w.h.includes(q) || w.p.toLowerCase().includes(q) || w.m.toLowerCase().includes(q));
  }
  if (currentFilter === 'known') data = data.filter(w => known[getKey(w)] === 'known');
  else if (currentFilter === 'unknown') data = data.filter(w => known[getKey(w)] === 'unknown');
  else if (currentFilter === 'unmarked') data = data.filter(w => !known[getKey(w)]);

  if (currentSort === 'hanzi') data.sort((a,b) => a.h.localeCompare(b.h, 'zh'));
  else if (currentSort === 'pinyin') data.sort((a,b) => a.p.localeCompare(b.p));
  else if (currentSort === 'known-first') data.sort((a,b) => {
    const sa = known[getKey(a)] === 'known' ? 0 : 1;
    const sb = known[getKey(b)] === 'known' ? 0 : 1;
    return sa - sb;
  });
  else if (currentSort === 'unknown-first') data.sort((a,b) => {
    const sa = known[getKey(a)] === 'unknown' ? 0 : 1;
    const sb = known[getKey(b)] === 'unknown' ? 0 : 1;
    return sa - sb;
  });
  return data;
}

// ========== RENDER ==========
function renderCards() {
  const data = getFiltered();
  const total = data.length;
  const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  if (currentPage > totalPages) currentPage = 1;
  const slice = data.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);

  document.getElementById('page-info').textContent = total > 0 ? `${total} từ · Trang ${currentPage}/${totalPages}` : '0 từ';

  const grid = document.getElementById('vocab-grid');
  if (slice.length === 0) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><div>Không tìm thấy từ nào</div></div>';
  } else {
    grid.innerHTML = slice.map(w => {
      const key = getKey(w);
      const st = known[key] || '';
      const markIcon = st === 'known' ? '✓' : st === 'unknown' ? '✗' : '○';
      return `<div class="word-card ${st}" onclick="cycleState('${key}')">
        <div class="wc-header">
          <span class="wc-hsk">HSK ${w.l}</span>
          <div class="wc-mark ${st}" title="Nhấn để đánh dấu">${markIcon}</div>
        </div>
        <div class="wc-hanzi">${w.h}</div>
        <div class="wc-pinyin">${w.p}</div>
        <div class="wc-type">${w.t}</div>
        <div class="wc-meaning">${w.m}</div>
      </div>`;
    }).join('');
  }
  renderPagination(totalPages);
  updateStats();
}

function renderPagination(totalPages) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  let html = '';
  html += `<button class="pag-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Trước</button>`;
  const range = [];
  for (let i=1; i<=totalPages; i++) {
    if (i===1 || i===totalPages || (i>=currentPage-2 && i<=currentPage+2)) range.push(i);
    else if (range[range.length-1] !== '...') range.push('...');
  }
  range.forEach(p => {
    if (p==='...') html += `<span style="padding:8px 4px;color:var(--muted)">…</span>`;
    else html += `<button class="pag-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });
  html += `<button class="pag-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Sau ›</button>`;
  el.innerHTML = html;
}

function goPage(p) { currentPage = p; renderCards(); window.scrollTo({top:0,behavior:'smooth'}); }

function updateStats() {
  const all = HSK_DATA;
  let totalKnown = 0, totalUnknown = 0;
  all.forEach(w => {
    const st = known[getKey(w)];
    if (st === 'known') totalKnown++;
    else if (st === 'unknown') totalUnknown++;
  });
  document.getElementById('stat-known').textContent = totalKnown + ' đã thuộc';
  document.getElementById('stat-unknown').textContent = totalUnknown + ' chưa thuộc';
  document.getElementById('stat-total').textContent = all.length + ' tổng';

  const pct = Math.round(totalKnown / all.length * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  updateLevelCounts();
}

function updateLevelCounts() {
  [0,1,2,3,4,5,6].forEach(l => {
    const el = document.getElementById('lcount-' + l);
    if (!el) return;
    const words = l===0 ? HSK_DATA : HSK_DATA.filter(w=>w.l===l);
    const k = words.filter(w=>known[getKey(w)]==='known').length;
    el.textContent = `${k}/${words.length}`;
  });
}

// ========== ACTIONS ==========
function cycleState(key) {
  const cur = known[key] || '';
  if (!cur) known[key] = 'known';
  else if (cur === 'known') known[key] = 'unknown';
  else delete known[key];
  saveState();
  renderCards();
  const label = known[key] === 'known' ? '✓ Đã thuộc' : known[key] === 'unknown' ? '✗ Chưa thuộc' : '○ Bỏ đánh dấu';
  showToast(label);
}

function setLevel(l) {
  currentLevel = l;
  currentPage = 1;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.toggle('active', b.dataset.level===String(l)));
  renderCards();
}

function setFilter(f) {
  currentFilter = f;
  currentPage = 1;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter===f));
  renderCards();
}

function onSearch() {
  searchQuery = document.getElementById('search').value.trim();
  currentPage = 1;
  renderCards();
}

function onSort(v) {
  currentSort = v;
  currentPage = 1;
  renderCards();
}

function resetAll() {
  if (!confirm('Xóa tất cả đánh dấu?')) return;
  known = {};
  saveState();
  renderCards();
  showToast('Đã xóa tất cả đánh dấu');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 1800);
}

// ========== INIT LEVEL BUTTONS ==========
function initLevelButtons() {
  const container = document.getElementById('level-btns');
  const levels = [
    {l:0, label:'Tất cả cấp độ'},
    {l:1, label:'HSK 1'},
    {l:2, label:'HSK 2'},
    {l:3, label:'HSK 3'},
    {l:4, label:'HSK 4'},
    {l:5, label:'HSK 5'},
    {l:6, label:'HSK 6'},
  ];
  container.innerHTML = levels.map(lv => {
    const count = lv.l===0 ? HSK_DATA.length : HSK_DATA.filter(w=>w.l===lv.l).length;
    return `<button class="level-btn ${lv.l===0?'active':''}" data-level="${lv.l}" onclick="setLevel(${lv.l})">
      <span>${lv.label}</span>
      <span class="lcount" id="lcount-${lv.l}">0/${count}</span>
    </button>`;
  }).join('');
}

// ========== BOOT ==========
loadState();
initLevelButtons();
renderCards();
</script>
